<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 만족도 설문조사</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .form-box {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input, select, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #007bff;
      color: #fff;
      border: none;
    }
    h2 { text-align: center; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>고객 만족도 설문조사</h2>
    <form id="surveyForm">
      <input type="text" name="name" placeholder="이름 (선택)" />
      <select name="satisfaction" required>
        <option value="">서비스 만족도 선택</option>
        <option value="매우 만족">매우 만족</option>
        <option value="만족">만족</option>
        <option value="보통">보통</option>
        <option value="불만족">불만족</option>
      </select>
      <textarea name="comment" placeholder="기타 의견을 적어주세요" rows="4"></textarea>
      <button type="submit">설문 제출</button>
    </form>
    <p id="responseMsg"></p>
  </div>

  <script>
    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        name: form.name.value,
        satisfaction: form.satisfaction.value,
        comment: form.comment.value
      };
      try {
        const res = await fetch('/api/survey', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          document.getElementById('responseMsg').innerText = '✅ 제출되었습니다. 감사합니다!';
          form.reset();
        } else {
          document.getElementById('responseMsg').innerText = '❌ 제출 실패. 다시 시도해주세요.';
        }
      } catch (err) {
        document.getElementById('responseMsg').innerText = '⚠️ 서버 오류';
      }
    });
  </script>
</body>
</html>
