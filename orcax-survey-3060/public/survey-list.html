<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>고객 만족도 설문 결과</title>
</head>
<body>
  <h2>📋 고객 만족도 설문 결과</h2>
  <div id="survey-results">불러오는 중...</div>

  <script>
    async function fetchSurveys() {
      try {
        const res = await fetch(`${window.location.origin}/api/surveys`);
        const data = await res.json();
        const container = document.getElementById('survey-results');
        container.innerHTML = data.map(s => `<p><b>${s.name}</b>: ${s.comment}</p>`).join('');
      } catch (error) {
        document.getElementById('survey-results').innerHTML = '<span style="color:red;">설문 데이터를 불러오지 못했습니다.</span>';
      }
    }

    fetchSurveys(); // 반드시 <script> 태그 안에서 호출
  </script>
</body>
</html>
