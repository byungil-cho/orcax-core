<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설문 결과 리스트</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
    }
    th, td {
      padding: 12px;
      border: 1px solid #dee2e6;
      text-align: center;
    }
    th {
      background-color: #007BFF;
      color: white;
    }
    tbody tr:nth-child(even) {
      background-color: #f1f3f5;
    }
  </style>
</head>
<body>
  <h2>설문 결과 리스트</h2>
  <table>
    <thead>
      <tr>
        <th>이름</th>
        <th>만족도</th>
        <th>의견</th>
        <th>제출일</th>
      </tr>
    </thead>
    <tbody id="surveyBody">
      <tr><td colspan="4">로딩 중...</td></tr>
    </tbody>
  </table>

  <script>
    fetch('https://orcax-survey-3060.onrender.com/api/survey')
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById('surveyBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4">제출된 설문이 없습니다.</td></tr>';
          return;
        }

        data.forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.satisfaction}</td>
            <td>${item.feedback}</td>
            <td>${new Date(item.createdAt).toLocaleString()}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById('surveyBody').innerHTML =
          '<tr><td colspan="4">데이터를 불러오는 데 실패했습니다.</td></tr>';
      });
  </script>
</body>
</html>

</html>
