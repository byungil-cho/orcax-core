<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>설문 결과 리스트</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 30px; }
    .container { max-width: 960px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    th { background-color: #007bff; color: white; }
    .delete-button { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>설문 결과 리스트</h2>
    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>만족도</th>
          <th>의견</th>
          <th>제출일</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="surveyBody"><tr><td colspan="5">로딩 중...</td></tr></tbody>
    </table>
  </div>

  <script>
    function loadSurveys() {
      fetch('/api/survey')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('surveyBody');
          tbody.innerHTML = '';
          if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">설문 없음</td></tr>';
            return;
          }
          data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = \`
              <td>\${item.name}</td>
              <td>\${item.satisfaction}</td>
              <td>\${item.feedback || '-'}</td>
              <td>\${new Date(item.createdAt).toLocaleString()}</td>
              <td><button class="delete-button" onclick="deleteSurvey('\${item._id}')">삭제</button></td>
            \`;
            tbody.appendChild(row);
          });
        })
        .catch(() => {
          document.getElementById('surveyBody').innerHTML = '<tr><td colspan="5">불러오기 실패</td></tr>';
        });
    }

    function deleteSurvey(id) {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      fetch('/api/survey/' + id, { method: 'DELETE' })
        .then(res => {
          if (res.ok) {
            alert('삭제 완료');
            loadSurveys();
          } else {
            alert('삭제 실패');
          }
        });
    }

    loadSurveys();
  </script>
</body>
</html>
