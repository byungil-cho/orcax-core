<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>설문 결과 리스트 + 통계 + 삭제</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(to right, #f0f2f5, #ffffff);
      margin: 0;
      padding: 40px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      margin-bottom: 30px;
    }

    th, td {
      padding: 14px 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    th {
      background-color: #007BFF;
      color: white;
      font-size: 1rem;
    }

    tbody tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    .no-data {
      text-align: center;
      padding: 20px;
      color: #888;
      font-style: italic;
    }

    .chart-container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .delete-button {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-button:hover {
      background: #b02a37;
    }

    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead {
        display: none;
      }
      tr {
        margin-bottom: 15px;
        background: #f9f9f9;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        padding: 12px;
      }
      td {
        text-align: left;
        padding: 8px 10px;
        font-size: 0.9rem;
        border-bottom: none;
        display: flex;
        justify-content: space-between;
      }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>설문 결과 리스트</h2>
    <table id="surveyTable">
      <thead>
        <tr>
          <th>이름</th>
          <th>만족도</th>
          <th>의견</th>
          <th>제출일</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="surveyBody">
        <tr><td colspan="5" class="no-data">데이터를 불러오는 중입니다...</td></tr>
      </tbody>
    </table>

    <h2 style="margin-top: 40px;">📊 만족도 통계</h2>
    <div class="chart-container">
      <canvas id="satisfactionChart" width="300" height="300"></canvas>
      <p id="noDataMsg"></p>
    </div>
  </div>

  <script>
    // fetch and render
    function loadSurveys() {
      fetch('https://orcax-survey-3060.onrender.com/api/survey')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('surveyBody');
          const chartMsg = document.getElementById('noDataMsg');
          tbody.innerHTML = '';

          if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="no-data">제출된 설문이 없습니다.</td></tr>`;
            chartMsg.textContent = '설문 데이터가 없습니다.';
            return;
          }

          // 최신 5개만
          const recent = data.slice(-5).reverse();

          recent.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td data-label="이름">${item.name}</td>
              <td data-label="만족도">${item.satisfaction}</td>
              <td data-label="의견">${item.feedback || '—'}</td>
              <td data-label="제출일">${new Date(item.createdAt).toLocaleString()}</td>
              <td data-label="삭제">
                <button class="delete-button" onclick="deleteSurvey('${item._id}')">삭제</button>
              </td>
            `;
            tbody.appendChild(row);
          });

          // 통계
          const counts = {
            '매우 만족': 0,
            '만족': 0,
            '보통': 0,
            '불만족': 0,
            '매우 불만족': 0,
          };

          data.forEach(item => {
            if (counts[item.satisfaction] !== undefined) {
              counts[item.satisfaction]++;
            }
          });

          // Chart.js 도넛
          const ctx = document.getElementById('satisfactionChart').getContext('2d');
          new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: Object.keys(counts),
              datasets: [{
                data: Object.values(counts),
                backgroundColor: [
                  '#007BFF', '#28A745', '#FFC107', '#FD7E14', '#DC3545'
                ],
                borderWidth: 1
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: {
                  position: 'bottom'
                }
              }
            }
          });
        })
        .catch(err => {
          console.error(err);
          document.getElementById('surveyBody').innerHTML =
            `<tr><td colspan="5" class="no-data">데이터를 불러오는 데 실패했습니다.</td></tr>`;
          document.getElementById('noDataMsg').textContent = '그래프를 표시할 수 없습니다.';
        });
    }

    // 삭제 함수
    function deleteSurvey(id) {
      if (!confirm('정말 이 설문을 삭제하시겠습니까?')) return;

      fetch(`https://orcax-survey-3060.onrender.com/api/survey/${id}`, {
        method: 'DELETE'
      })
      .then(res => {
        if (res.ok) {
          alert('삭제 완료!');
          loadSurveys(); // 재로드
        } else {
          alert('삭제 실패 (서버 응답 오류)');
        }
      })
      .catch(err => {
        console.error(err);
        alert('삭제 중 오류 발생');
      });
    }

    // 최초 실행
    loadSurveys();
  </script>
</body>
</html>
