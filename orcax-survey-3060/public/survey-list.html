<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>설문 결과 리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(to right, #f0f2f5, #ffffff);
      margin: 0;
      padding: 40px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    th, td {
      padding: 14px 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    th {
      background-color: #007BFF;
      color: white;
      font-size: 1rem;
    }

    tbody tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    .no-data {
      text-align: center;
      padding: 20px;
      color: #888;
      font-style: italic;
    }

    #noDataMsg {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      color: #28a745;
    }

    .delete-button {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-button:hover {
      background: #b02a37;
    }

    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead {
        display: none;
      }
      tr {
        margin-bottom: 15px;
        background: #f9f9f9;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        padding: 12px;
      }
      td {
        text-align: left;
        padding: 8px 10px;
        font-size: 0.9rem;
        border-bottom: none;
        display: flex;
        justify-content: space-between;
      }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>설문 결과 리스트</h2>
    <table id="surveyTable">
      <thead>
        <tr>
          <th>이름</th>
          <th>만족도</th>
          <th>의견</th>
          <th>제출일</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="surveyBody">
        <tr><td colspan="5" class="no-data">데이터를 불러오는 중입니다...</td></tr>
      </tbody>
    </table>

    <p id="noDataMsg"></p>
  </div>

  <script>
    function loadSurveys() {
      fetch('https://orcax-survey-3060.onrender.com/api/survey')
        .then(res => res.json())
        .then(data => {
          console.log("불러온 설문 데이터:", data);
          const tbody = document.getElementById('surveyBody');
          const msg = document.getElementById('noDataMsg');
          tbody.innerHTML = '';

          if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="no-data">제출된 설문이 없습니다.</td></tr>`;
            msg.textContent = '😢 설문 데이터가 없습니다.';
            return;
          }

          // ✅ 모든 데이터를 그대로 출력
          data.reverse().forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td data-label="이름">${item.name || '이름없음'}</td>
              <td data-label="만족도">${item.satisfaction || '-'}</td>
              <td data-label="의견">${item.feedback || '—'}</td>
              <td data-label="제출일">${item.createdAt ? new Date(item.createdAt).toLocaleString() : '-'}</td>
              <td data-label="삭제">
                <button class="delete-button" onclick="deleteSurvey('${item._id}')">삭제</button>
              </td>
            `;
            tbody.appendChild(row);
          });

          msg.textContent = `✅ 설문 ${data.length}건이 성공적으로 불러와졌습니다!`;
        })
        .catch(err => {
          console.error("데이터 로딩 오류:", err);
          document.getElementById('surveyBody').innerHTML =
            `<tr><td colspan="5" class="no-data">데이터를 불러오는 데 실패했습니다.</td></tr>`;
          document.getElementById('noDataMsg').textContent = '⚠️ 설문 데이터를 불러오는 데 실패했습니다.';
        });
    }

    function deleteSurvey(id) {
      if (!confirm('정말 이 설문을 삭제하시겠습니까?')) return;

      fetch(`https://orcax-survey-3060.onrender.com/api/survey/${id}`, {
        method: 'DELETE'
      })
      .then(res => {
        if (res.ok) {
          alert('삭제 완료!');
          loadSurveys();
        } else {
          alert('삭제 실패 (서버 응답 오류)');
        }
      })
      .catch(err => {
        console.error(err);
        alert('삭제 중 오류 발생');
      });
    }

    document.addEventListener('DOMContentLoaded', loadSurveys);
  </script>
</body>
</html>
