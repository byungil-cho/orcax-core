<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>고객 만족도 설문 결과</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f6f9fc;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #113366;
      margin-bottom: 30px;
    }
    .entry {
      border-bottom: 1px solid #ddd;
      padding: 12px 0;
    }
    .entry:last-child {
      border-bottom: none;
    }
    .entry p {
      margin: 6px 0;
      font-size: 15px;
    }
    .entry em {
      font-size: 13px;
      color: gray;
    }
    .error {
      text-align: center;
      color: red;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .container {
        padding: 16px;
      }
      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📋 고객 만족도 설문 결과</h2>
    <div id="resultBox" class="entry">
      <p>데이터를 불러오는 중입니다...</p>
    </div>
  </div>

  <script>
    async function fetchSurveys() {
      try {
        const res = await fetch('https://orcax-survey-3060.onrender.com/api/survey');
        const data = await res.json();

        const container = document.getElementById('resultBox');
        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<p>아직 등록된 설문 결과가 없습니다.</p>';
          return;
        }

        container.innerHTML = data.map(entry => `
          <div class="entry">
            <p><strong>이름:</strong> ${entry.name || '익명'}</p>
            <p><strong>만족도:</strong> ${entry.satisfaction}</p>
            <p><strong>의견:</strong> ${entry.comment || '-'}</p>
            <p><em>${new Date(entry.date).toLocaleString('ko-KR')}</em></p>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('resultBox').innerHTML =
          `<p class="error">❌ 설문 데이터를 불러오지 못했습니다.</p>`;
        console.error('불러오기 오류:', error);
      }
    }

    fetchSurveys();
  </script>
</body>
</html>
