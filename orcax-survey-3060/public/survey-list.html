<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 만족도 설문 결과</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      background-color: #f5f9fc;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      max-width: 960px;
      margin: 60px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    h2 {
      font-size: 28px;
      color: #123c68;
      margin-bottom: 24px;
      text-align: center;
    }
    .survey-item {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }
    .survey-item:last-child {
      border-bottom: none;
    }
    .error {
      color: red;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📄 고객 만족도 설문 결과</h2>
    <div id="survey-list">
      <p class="error">설문 데이터를 불러오지 못했습니다.</p>
    </div>
  </div>

  <script>
    async function fetchSurveys() {
      try {
        const origin = window.location.origin;
        const response = await fetch(`${origin}/api/surveys`);
        const surveys = await response.json();

        const list = document.getElementById('survey-list');
        if (surveys.length === 0) {
          list.innerHTML = '<p class="error">등록된 설문이 없습니다.</p>';
          return;
        }

        list.innerHTML = '';
        surveys.forEach(s => {
          const div = document.createElement('div');
          div.className = 'survey-item';
          div.innerHTML = `
            <strong>이름:</strong> ${s.name || '익명'}<br>
            <strong>마음에 들기:</strong> ${s.satisfaction || '-'}<br>
            <strong>의견:</strong> ${s.comment || '없음'}<br>
            <small>${new Date(s.date).toLocaleString()}</small>
          `;
          list.appendChild(div);
        });
      } catch (err) {
        console.error('fetch 실패:', err);
        document.getElementById('survey-list').innerHTML = '<p class="error">서버 연결에 실패했습니다.</p>';
      }
    }

    fetchSurveys();
  </script>
</body>
</html>
