<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>공지사항 등록</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      padding: 20px;
      text-align: center;
    }
    .hidden { display: none; }
    input, textarea {
      padding: 10px;
      margin: 10px 0;
      width: 300px;
    }
    .box {
      background: white;
      border-radius: 8px;
      padding: 30px;
      display: inline-block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .success { color: green; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="box" id="loginBox">
    <h2>관리자 로그인</h2>
    <input type="password" id="password" placeholder="비밀번호 입력" />
    <br />
    <button onclick="checkPassword()">확인</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div class="box hidden" id="formBox">
    <h2>📢 공지사항 등록</h2>
    <input type="text" id="title" placeholder="제목" /><br />
    <textarea id="content" rows="4" placeholder="내용을 입력하세요."></textarea><br />
    <button onclick="submitNotice()">공지 등록</button>
    <p class="success" id="successMessage" style="display:none;">✅ 공지 등록 성공!</p>
  </div>

  <script>
    function checkPassword() {
      const pw = document.getElementById("password").value;
      if (pw === "2025") {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("formBox").classList.remove("hidden");
      } else {
        document.getElementById("error").textContent = "비밀번호가 틀렸습니다.";
      }
    }

    async function submitNotice() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;
      const res = await fetch("/api/notices", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, content })
      });
      if (res.ok) {
        document.getElementById("successMessage").style.display = "block";
        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
      }
    }
  </script>
</body>
</html>
