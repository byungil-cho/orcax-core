<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 결과 보기</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f7fa;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      color: #003366;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    .entry {
      border-left: 4px solid #28a745;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #fdfdfd;
      border-radius: 6px;
    }

    .entry .meta {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
    }

    .entry .feedback {
      color: #333;
      line-height: 1.4;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📋 고객 만족도 설문 결과</h2>
    <div id="survey-results">불러오는 중입니다...</div>
  </div>

  <script>
    fetch("https://orcax-core-radm.onrender.com/api/survey")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("survey-results");
        if (!data.length) {
          container.innerHTML = "<p>아직 설문이 등록되지 않았습니다.</p>";
          return;
        }

        container.innerHTML = "";
        data.forEach(entry => {
          const div = document.createElement("div");
          div.className = "entry";

          const date = new Date(entry.createdAt).toLocaleString("ko-KR");

          div.innerHTML = `
            <div class="meta">이름: ${entry.name || "익명"} | 만족도: ${entry.rating}점 | ${date}</div>
            <div class="feedback">${entry.feedback || "(의견 없음)"}</div>
          `;
          container.appendChild(div);
        });
      })
      .catch(err => {
        document.getElementById("survey-results").innerHTML =
          "<p style='color:red;'>설문 데이터를 불러오지 못했습니다.</p>";
        console.error(err);
      });
  </script>
</body>
</html>

    fetchSurveys();
  </script>
</body>
</html>
