<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 만족도 설문조사</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f7fa;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      color: #003366;
      font-size: 1.5em;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      font-size: 0.95em;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 1em;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    textarea {
      resize: vertical;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      border: none;
      color: white;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>고객 만족도 설문조사</h2>
    <form id="survey-form">
      <label for="name">이름 (선택)</label>
      <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" />

      <label for="rating">서비스 전반에 대한 만족도는?</label>
      <select id="rating" name="rating" required>
        <option value="">선택하세요</option>
        <option value="5">매우 만족</option>
        <option value="4">만족</option>
        <option value="3">보통</option>
        <option value="2">불만족</option>
        <option value="1">매우 불만족</option>
      </select>

      <label for="feedback">추가 의견이나 건의사항이 있다면 적어주세요:</label>
      <textarea id="feedback" name="feedback" rows="4" placeholder="의견을 자유롭게 작성해주세요."></textarea>

      <button type="submit">설문 제출</button>
      <div class="message" id="response"></div>
    </form>
  </div>

  <script>
    document.getElementById("survey-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        rating: document.getElementById("rating").value,
        feedback: document.getElementById("feedback").value
      };

      try {
        const res = await fetch("https://orcax-core-radm.onrender.com/api/survey", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        document.getElementById("response").textContent = result.message || "제출 완료!";
        document.getElementById("response").style.color = "green";
        document.getElementById("survey-form").reset();
      } catch (err) {
        document.getElementById("response").textContent = "제출에 실패했습니다. 다시 시도해주세요.";
        document.getElementById("response").style.color = "red";
      }
    });
  </script>
</body>
</html>
