<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f0f2f5;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      color: #003366;
      font-size: 1.6em;
      margin-bottom: 30px;
    }

    .notice {
      background: #fdfdfd;
      border-left: 4px solid #007bff;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
    }

    .notice-title {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 5px;
    }

    .notice-content {
      margin: 8px 0;
      color: #444;
      line-height: 1.5;
    }

    .notice-date {
      font-size: 0.85em;
      color: #888;
      text-align: right;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 15px;
      }
      h2 {
        font-size: 1.4em;
      }
      .notice-title {
        font-size: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📢 공지사항</h2>
    <div id="notices">공지사항을 불러오는 중입니다...</div>
  </div>

  <script>
    fetch("https://orcax-core-radm.onrender.com/api/notices")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("notices");
        if (data.length === 0) {
          container.innerHTML = "<p>등록된 공지사항이 없습니다.</p>";
          return;
        }

        container.innerHTML = "";
        data.forEach(item => {
          const notice = document.createElement("div");
          notice.className = "notice";

          const date = new Date(item.date).toLocaleString("ko-KR");

          notice.innerHTML = `
            <div class="notice-title">${item.title}</div>
            <div class="notice-content">${item.content}</div>
            <div class="notice-date">🕒 ${date}</div>
          `;

          container.appendChild(notice);
        });
      })
      .catch(error => {
        document.getElementById("notices").innerHTML =
          "<p style='color:red;'>서버에서 공지사항을 불러오는 데 실패했습니다.</p>";
        console.error("공지사항 불러오기 오류:", error);
      });
  </script>
</body>
</html>
